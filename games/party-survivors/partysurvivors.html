<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- Web app (mobil): po „Přidat na plochu" běží bez adresní lišty (na celé obrazovce) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Party Survivors">
  <link rel="apple-touch-icon" href="../../favicon.png">
  <title>Party Survivors</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Baloo 2 = baculaté párty písmo s plnou českou diakritikou (latin-ext);
       signature styl hry, záměrně jiný než zbytek webu (Press Start 2P) -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Permanent Marker = fixa/sprej styl; jen pro nápis "DON" v tagu Don G (bez diakritiky) -->
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; width: 100%; background: #000; overflow: hidden;
      touch-action: none; overscroll-behavior: none;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #game { width: 100%; height: 100%; touch-action: none; }
    #game canvas { display: block; touch-action: none; }

    /* Překryv: výzva k otočení na šířku — jen na dotykových zařízeních (html.touch)
       a jen když je telefon na výšku. Hra se přitom pauzuje (js/main.js). */
    #rotate {
      display: none; position: fixed; inset: 0; z-index: 50;
      flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      background: #050010; text-align: center; padding: 24px;
      font-family: "Baloo 2", "Trebuchet MS", sans-serif; font-weight: 800;
    }
    #rotate .icon { font-size: 64px; animation: rotateHint 1.8s ease-in-out infinite; }
    #rotate .txt { font-size: 20px; letter-spacing: 1px; color: #00ffff;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.7); }
    #rotate .txt2 { font-size: 14px; letter-spacing: 0.5px; color: #ffffff;
      opacity: 0.85; max-width: 340px; line-height: 1.3; }
    @keyframes rotateHint { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(75deg); } }
    /* šipka zpět na úvodní stránku webu — zobrazuje ji jen MenuScene */
    #back-home {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      font-family: "Baloo 2", "Trebuchet MS", sans-serif; font-weight: 800;
      font-size: 16px; letter-spacing: 1px;
      color: #ff2bd6; text-decoration: none; padding: 10px 12px;
      text-shadow: 0 0 8px rgba(255, 43, 214, 0.7);
      display: none;
    }
    #back-home:hover { color: #00ffff; text-shadow: 0 0 10px rgba(0, 255, 255, 0.8); }
  </style>
</head>
<body>
  <a id="back-home" href="../../index.html" title="Zpět na úvodní stránku">« ZPĚT</a>
  <div id="game"></div>
  <div id="rotate">
    <div class="icon">📱</div>
    <div class="txt">OTOČ TELEFON NA ŠÍŘKU</div>
    <div class="txt2">PRO FULLSCREEN JDI DO NASTAVENÍ -&gt; CELÁ OBRAZOVKA</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/touch.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/playlist.js"></script>
  <script src="js/music.js"></script>
  <script src="js/systems/spawner.js"></script>
  <script src="js/systems/weapons.js"></script>
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/MenuScene.js"></script>
  <script src="js/scenes/LeaderboardScene.js"></script>
  <script src="js/scenes/HelpScene.js"></script>
  <script src="js/scenes/SettingsScene.js"></script>
  <script src="js/scenes/NameScene.js"></script>
  <script src="js/scenes/HeroSelectScene.js"></script>
  <script src="js/scenes/GameScene.js"></script>
  <script src="js/scenes/HUDScene.js"></script>
  <script src="js/scenes/GameOverScene.js"></script>
  <script src="js/scenes/LevelUpScene.js"></script>
  <script src="js/scenes/RundaScene.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

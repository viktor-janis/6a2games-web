<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6&amp;2 Games</title>
  <meta name="description" content="6&amp;2 Games — retro arkádové hry přímo v prohlížeči. Zahraj si Party Survivors a 6&amp;2 Pong.">
  <link rel="icon" type="image/png" href="favicon.png">
  <!-- Náhled při sdílení odkazu (Open Graph / Twitter) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="6&amp;2 Games">
  <meta property="og:description" content="Retro arkádové hry přímo v prohlížeči — Party Survivors a 6&amp;2 Pong.">
  <meta property="og:url" content="https://6a2games.cz/">
  <meta property="og:image" content="https://6a2games.cz/favicon.png">
  <meta name="twitter:card" content="summary">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      color: #fff;
      background:
        radial-gradient(ellipse at center, #1a0033 0%, #050010 70%, #000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(40px, 8vh, 90px);
      overflow: hidden;
      position: relative;
      padding: 24px;
    }

    /* CRT scanlines */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0) 0px,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.28) 3px,
        rgba(0, 0, 0, 0.28) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* CRT flicker */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(120, 60, 180, 0.04);
      pointer-events: none;
      z-index: 101;
      animation: flicker 0.18s infinite;
    }

    @keyframes flicker {
      0%   { opacity: 0.28; }
      20%  { opacity: 0.18; }
      40%  { opacity: 0.85; }
      55%  { opacity: 0.10; }
      70%  { opacity: 0.66; }
      85%  { opacity: 0.42; }
      100% { opacity: 0.24; }
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 4.5rem);
      letter-spacing: 0.12em;
      text-align: center;
      color: #ff2bd6;
      text-shadow:
        0 0 6px #ff2bd6,
        0 0 14px #ff2bd6,
        0 0 28px #ff2bd6,
        0 0 60px #ff00aa;
      animation: titlePulse 2.4s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    h1 .amp {
      color: #ffe600;
      text-shadow:
        0 0 6px #ffe600,
        0 0 14px #ffe600,
        0 0 28px #ffaa00;
    }

    @keyframes titlePulse {
      0%, 100% {
        text-shadow:
          0 0 6px #ff2bd6,
          0 0 14px #ff2bd6,
          0 0 28px #ff2bd6,
          0 0 60px #ff00aa;
      }
      50% {
        text-shadow:
          0 0 10px #ff2bd6,
          0 0 22px #ff2bd6,
          0 0 44px #ff2bd6,
          0 0 90px #ff00aa;
      }
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 22px;
      position: relative;
      z-index: 1;
    }

    .menu-item {
      display: block;
      text-align: center;
      min-width: clamp(260px, 40vw, 440px);
      font-family: inherit;
      font-size: clamp(0.85rem, 1.8vw, 1.3rem);
      letter-spacing: 0.14em;
      color: #00ffff;
      text-decoration: none;
      padding: 18px 28px;
      border: 3px solid #00ffff;
      background: rgba(0, 255, 255, 0.04);
      text-shadow: 0 0 8px #00ffff;
      box-shadow:
        0 0 8px #00ffff,
        0 0 22px rgba(0, 255, 255, 0.35),
        inset 0 0 14px rgba(0, 255, 255, 0.15);
      transition:
        color 0.15s ease,
        background 0.15s ease,
        box-shadow 0.15s ease,
        transform 0.15s ease;
      position: relative;
      cursor: pointer;
    }

    .menu-item .arrow {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%) translateX(-6px);
      opacity: 0;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .menu-item:hover,
    .menu-item:focus-visible {
      color: #050010;
      background: #00ffff;
      text-shadow: none;
      outline: none;
      box-shadow:
        0 0 14px #00ffff,
        0 0 40px #00ffff,
        0 0 80px rgba(0, 255, 255, 0.6),
        inset 0 0 18px rgba(255, 255, 255, 0.4);
      transform: scale(1.04);
    }

    .menu-item:hover .arrow,
    .menu-item:focus-visible .arrow {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
      animation: arrowBlink 0.6s steps(1) infinite;
    }

    @keyframes arrowBlink {
      50% { opacity: 0; }
    }

    .menu-item:active {
      transform: scale(0.98);
    }

    /* Úvodní „attract" překryv — zachytí první gesto (klik/klávesa/dotyk), aby se
       odemkl ambient zvuk menu. První klik tak nepadne rovnou na položku menu
       (ta by hned odvedla do hry a zvuk by se jen „probzukl"). z-index je pod
       scanlines (100) i flickerem (101), aby CRT efekt platil i přes překryv. */
    #enter-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse at center, #1a0033 0%, #050010 70%, #000 100%);
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    #enter-overlay .prompt {
      /* texty jen ASCII — Press Start 2P nemá české diakritiky (latin subset) */
      font-size: clamp(0.9rem, 2.4vw, 1.6rem);
      letter-spacing: 0.14em;
      text-align: center;
      color: #00ffff;                 /* azurová = „klikací", stejně jako menu */
      text-shadow: 0 0 8px #00ffff;   /* stejná intenzita jako .menu-item */
      animation: pressBlink 1s steps(1) infinite;
    }

    #enter-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes pressBlink {
      50% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      #enter-overlay { transition: none; }
      #enter-overlay .prompt { animation: none; }
      body::after { animation: none; }   /* CRT flicker — trvale běžící, zklidnit */
      h1 { animation: none; }            /* pulzování titulku */
      .menu-item:hover .arrow,
      .menu-item:focus-visible .arrow { animation: none; }
    }
  </style>
</head>
<body>
  <h1>6<span class="amp">&amp;</span>2 GAMES</h1>
  <nav inert>
    <a class="menu-item" href="games/pong/index.html">
      <span class="arrow">&#9658;</span>
      <span>6&amp;2 PONG</span>
    </a>
    <a class="menu-item" href="games/party-survivors/partysurvivors.html">
      <span class="arrow">&#9658;</span>
      <span>PARTY SURVIVORS</span>
    </a>
  </nav>

  <div id="enter-overlay" role="button" tabindex="0" aria-label="Vstoupit a zapnout zvuk">
    <span class="prompt">&#9658; KLIKNI PRO START &#9668;</span>
  </div>

  <script src="menu-ambient.js"></script>
  <script>
    // Úvodní „attract" překryv: první gesto (klik/klávesa/dotyk) ho zhasne a
    // odkryje menu. Samotný zvuk spouští menu-ambient.js (jeho gesture-listener
    // na window) — tady jen uklidíme překryv a vrátíme menu do hry (sundáme inert).
    (function () {
      var overlay = document.getElementById('enter-overlay');
      if (!overlay) return;
      var nav = document.querySelector('nav');
      var GESTURES = ['pointerdown', 'keydown', 'touchstart'];
      var done = false;
      function dismiss() {
        if (done) return;
        done = true;
        GESTURES.forEach(function (ev) { window.removeEventListener(ev, dismiss, true); });
        if (nav) nav.removeAttribute('inert');
        overlay.classList.add('hidden');
        var hide = function () { overlay.style.display = 'none'; };
        overlay.addEventListener('transitionend', hide, { once: true });
        setTimeout(hide, 500); // fallback, kdyby transitionend nedorazil
      }
      GESTURES.forEach(function (ev) { window.addEventListener(ev, dismiss, true); });
    })();

    // Při odchodu do hry označ, že jdeme z rozcestníku — hra se pak umí vrátit
    // HISTORIÍ (přes bfcache), takže ambient zvuk menu po návratu zase naběhne sám.
    document.querySelectorAll('.menu-item').forEach(function (a) {
      a.addEventListener('click', function () {
        try { sessionStorage.setItem('from-hub', '1'); } catch (e) { /* soukromý režim */ }
      });
    });
  </script>
</body>
</html>
